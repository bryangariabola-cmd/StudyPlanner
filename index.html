<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlanner | Nivel Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-calendar-days"></i> StudyPlanner</h1>
            <p>Generador inteligente de horarios con pausas activas y metas personales</p>
        </header>

        <main>
            <form id="plannerForm">
                <div class="form-group">
                    <label for="studentName"><i class="fa-solid fa-user"></i> Tu Nombre:</label>
                    <input type="text" id="studentName" placeholder="Ej. Bryan Garcia" required>
                    <span id="nameError" class="error"></span>
                </div>

                <div class="form-group">
                    <label for="studentGoal"><i class="fa-solid fa-bullseye"></i> ¿Cuál es tu gran meta?:</label>
                    <input type="text" id="studentGoal" placeholder="Ej. Pasar examen de la universidad, sacar 100..." required>
                    <span id="goalError" class="error"></span>
                </div>

                <div class="form-group">
                    <label for="subjects"><i class="fa-solid fa-book"></i> Materias a estudiar (separadas por comas):</label>
                    <input type="text" id="subjects" placeholder="Ej. Matemáticas, Física, Química, Inglés" required>
                    <small class="help-text">Tip: Separa cada materia usando una coma `,`</small>
                    <span id="subjectsError" class="error"></span>
                </div>

                <div class="form-group">
                    <label for="hoursPerDay"><i class="fa-solid fa-clock"></i> Horas disponibles para estudiar al día:</label>
                    <input type="number" id="hoursPerDay" min="1" max="12" step="0.5" placeholder="Ej. 4" required>
                    <span id="hoursError" class="error"></span>
                </div>

                <div class="form-group">
                    <label for="startTime"><i class="fa-solid fa-hourglass-start"></i> ¿A qué hora vas a empezar?:</label>
                    <input type="time" id="startTime" required value="16:00">
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generar Horario Optimizado
                </button>
            </form>

            <section id="resultSection" class="hidden">
                <h2 id="welcomeMessage">¡Planificador optimizado!</h2>
                
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th><i class="fa-solid fa-calendar-day"></i> Día</th>
                                <th><i class="fa-solid fa-layer-group"></i> Materias Asignadas</th>
                                <th><i class="fa-solid fa-hourglass-half"></i> Horas de Enfoque</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>

                <div class="motivation-box">
                    <i class="fa-solid fa-quote-left"></i>
                    <p id="motivationMessage">Cargando frase de motivación...</p>
                </div>

                <div class="actions-container">
                    <button id="printBtn" class="btn-primary">
                        <i class="fa-solid fa-print"></i> Imprimir Horario
                    </button>
                    <button id="resetBtn" class="btn-reset">
                        <i class="fa-solid fa-trash-can"></i> Borrar Horario y Empezar de Nuevo
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
